# Fly.io config for Hack & Mack Wheel Tracker server
# Replace "wheel-tracker-hackandmack" with your chosen app name
# (must be globally unique on Fly.io)

app            = "wheel-tracker-hackandmack"
primary_region = "ord"   # Chicago — change if you prefer another region

[build]

[http_service]
  internal_port       = 5000
  force_https         = true
  auto_stop_machines  = true   # scales to zero when idle — saves cost
  auto_start_machines = true   # wakes up automatically on first request
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
