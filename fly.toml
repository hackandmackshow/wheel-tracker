app            = "wheel-tracker"
primary_region = "iad"   
[build]

[http_service]
  internal_port       = 5000
  force_https         = true
  auto_stop_machines  = true   # scales to zero when idle — saves cost
  auto_start_machines = true   # wakes up automatically on first request
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
